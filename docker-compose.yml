version: "3.9"

services:
  # ─────────────────────────────────────────
  # PostgreSQL Database
  # ─────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: securereview_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-securereview}
      POSTGRES_USER: ${POSTGRES_USER:-securereview}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-securereview_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-securereview}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - securereview_net

  # ─────────────────────────────────────────
  # Redis (Cache + Celery Broker)
  # ─────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: securereview_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_secret}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--pass", "${REDIS_PASSWORD:-redis_secret}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - securereview_net

  # ─────────────────────────────────────────
  # FastAPI Backend
  # ─────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: securereview_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-securereview}:${POSTGRES_PASSWORD:-securereview_secret}@postgres:5432/${POSTGRES_DB:-securereview}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-changeme_super_secret_key_minimum_32_chars}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      AI_PROVIDER: ${AI_PROVIDER:-gemini}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:5173}
      MAX_FILE_SIZE_MB: ${MAX_FILE_SIZE_MB:-50}
      UPLOAD_DIR: /app/uploads
    volumes:
      - uploads_data:/app/uploads
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    networks:
      - securereview_net

  # ─────────────────────────────────────────
  # Celery Worker (Scan Queue)
  # ─────────────────────────────────────────
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: securereview_worker
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-securereview}:${POSTGRES_PASSWORD:-securereview_secret}@postgres:5432/${POSTGRES_DB:-securereview}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-changeme_super_secret_key_minimum_32_chars}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      AI_PROVIDER: ${AI_PROVIDER:-gemini}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      UPLOAD_DIR: /app/uploads
    volumes:
      - uploads_data:/app/uploads
      - ./backend:/app
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=4 -Q scans
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - securereview_net

  # ─────────────────────────────────────────
  # Celery Flower (Worker Monitor)
  # ─────────────────────────────────────────
  flower:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: securereview_flower
    restart: unless-stopped
    environment:
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379/0
    command: celery -A app.workers.celery_app flower --port=5555 --broker=redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379/0
    ports:
      - "5555:5555"
    depends_on:
      - redis
      - celery_worker
    networks:
      - securereview_net

  # ─────────────────────────────────────────
  # React Frontend (Vite Dev)
  # ─────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: securereview_frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
      VITE_WS_URL: ${VITE_WS_URL:-ws://localhost:8000}
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - securereview_net

volumes:
  postgres_data:
  redis_data:
  uploads_data:

networks:
  securereview_net:
    driver: bridge
